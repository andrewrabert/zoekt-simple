name: Build

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get tag annotation
        id: tag-msg
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")
          tag_sha=$(echo "$ref_json" | jq -r '.object.sha')
          tag_msg=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.message')
          echo "msg<<TAGEOF" >> "$GITHUB_OUTPUT"
          echo "$tag_msg" >> "$GITHUB_OUTPUT"
          echo "TAGEOF" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          TAG_MSG: ${{ steps.tag-msg.outputs.msg }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$TAG" \
            -f name="$TAG" \
            -f body="$TAG_MSG" \
            -F draft=true \
            -F prerelease=false

  build:
    runs-on: ubuntu-latest
    needs: create-release
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p build/
          go build -o build/ ./cmd/...
          cd zoekt && go build -o ../build/ ./cmd/...

      - name: Create archive
        run: tar -czf zoekt-${{ matrix.suffix }}.tar.gz -C build .

      - name: Upload artifact to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" zoekt-${{ matrix.suffix }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: zoekt-${{ matrix.suffix }}
          path: zoekt-${{ matrix.suffix }}.tar.gz

  publish-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mark release as non-draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest=false
